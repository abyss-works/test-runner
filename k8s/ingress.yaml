apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{PROJECT_NAME}}"
spec:
  ingressClassName: nginx
  rules:
    - host: "{{DOMAIN}}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: "{{PROJECT_NAME}}"
                port:
                  number: 80
