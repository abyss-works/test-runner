apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{PROJECT_NAME}}"
  labels:
    app: "{{PROJECT_NAME}}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: "{{PROJECT_NAME}}"
  template:
    metadata:
      labels:
        app: "{{PROJECT_NAME}}"
    spec:
      containers:
        - name: app
          image: "{{CONTAINER_REGISTRY}}/{{PROJECT_NAME}}:latest"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: "{{PROJECT_NAME}}"
spec:
  selector:
    app: "{{PROJECT_NAME}}"
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
