apiVersion: apps/v1
kind: Deployment
metadata:
  name: "test-runner"
  labels:
    app: "test-runner"
spec:
  replicas: 2
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      nodeSelector:
        kubernetes.io/arch: arm64
  selector:
    matchLabels:
      app: "test-runner"
  template:
    metadata:
      labels:
        app: "test-runner"
    spec:
      containers:
        - name: app
          image: "registry.abyssworks.dev/test-runner:latest"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: "test-runner"
spec:
  selector:
    app: "test-runner"
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
